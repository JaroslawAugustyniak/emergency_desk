server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /_next/static {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /public {
        expires 365d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
