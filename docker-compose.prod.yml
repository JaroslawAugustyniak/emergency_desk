services:
  mysql:
    image: mysql:8.0
    container_name: ed_mysql_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ed_backend_prod
    restart: always
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ed_queue_worker_prod
    restart: always
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
    command: php artisan queue:work --delay=3 --max-jobs=1000 --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - backend
    profiles:
      - queue

volumes:
  mysql_data:
    driver: local

networks:
  backend:
    driver: bridge
