services:
  mysql:
    image: mysql:8.0
    container_name: ed_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3309:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ed_network
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    image: ghcr.io/jaroslawaugustyniak/emergency_desk:latest
    container_name: ed_backend_prod
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
      QUEUE_CONNECTION: database
      CONTAINER_TYPE: combined
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - ed_network
      - npm_network
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    image: ghcr.io/jaroslawaugustyniak/emergency_desk-frontend:latest
    container_name: ed_frontend_prod
    restart: always
    environment:
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - ed_network
      - npm_network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ed_queue_worker
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
      QUEUE_CONNECTION: database
      CONTAINER_TYPE: queue-worker
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - ed_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  ed_network:
    driver: bridge
  npm_network:
    external: true
    name: nginx-proxy-manager_default
